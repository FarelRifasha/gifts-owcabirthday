<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Closing Letter</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ff9ecb,#ffc1da,#ffd6e7);
  font-family:"Courier New", monospace;
  overflow:hidden;
}

/* ================= BACKGROUND DECOR ================= */
.decor{
  position:absolute;
  width:100%;
  height:100%;
  overflow:hidden;
  z-index:0;
}

.item{
  position:absolute;
  animation:floatUp linear infinite;
  opacity:.7;
  font-size:18px;
}

@keyframes floatUp{
  from{transform:translateY(100vh) scale(.8); opacity:0;}
  20%{opacity:.8;}
  to{transform:translateY(-10vh) scale(1.2); opacity:0;}
}

/* ================= CLOSING CARD ================= */
.closing-card{
  position:relative;
  z-index:2;
  background:white;
  padding:45px 35px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
  opacity:0;
  transform:translateY(40px);
  transition:1.5s;
  max-width:320px;
}

.closing-card.show{
  opacity:1;
  transform:translateY(0);
}

.closing-card h2{
  margin:0;
  font-size:24px;
  color:#222;
}

.closing-card p{
  margin-top:15px;
  font-size:15px;
  color:#555;
  line-height:1.6;
}

.heart{
  font-size:40px;
  margin:20px 0;
  animation:beat 1.5s infinite;
}

.sign{
  font-weight:bold;
  color:black;
  display:block;
  margin-top:10px;
  font-size:16px;
}

.footer-note {
  position: absolute;
  bottom: 20px;
  font-size: 10px;
  color: #888;
  letter-spacing: 1px;
  text-transform: uppercase;
  z-index: 5;
  opacity: 0.6;
}

/* ================= ANIMATIONS ================= */
@keyframes beat{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.2);}
}
</style>
</head>
<body>

<div class="decor" id="decor"></div>

<div class="closing-card" id="card">
  <h2>Thank You For Reading 🤍</h2>
  <p>
    Semoga hari kamu selalu dipenuhi hal-hal baik,<br>
    dan senyum kamu ga pernah hilang.
  </p>
  <div class="heart">🤍</div>
  <span class="sign">— From: Farel</span>
</div>

<div class="footer-note">Built by Farel</div>

<script>
/* ================= BACKGROUND DECOR ================= */
const decor=document.getElementById("decor");
const icons=["🤍","🌸","✨","💗","💮"];

for(let i=0;i<30;i++){
  let el=document.createElement("div");
  el.className="item";
  el.innerHTML=icons[Math.floor(Math.random()*icons.length)];
  el.style.left=Math.random()*100+"%";
  el.style.animationDuration=(6+Math.random()*6)+"s";
  el.style.animationDelay=Math.random()*5+"s";
  decor.appendChild(el);
}

/* ================= SHOW CLOSING CARD ================= */
const card=document.getElementById("card");
setTimeout(()=>{
  card.classList.add("show");
},800); // delay biar agak dreamy
</script>

</body>
</html>
