<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="icon" href="https://fav.farm/🎂" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Rossa Amelia Iskandar ❤️</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Poppins,sans-serif;
background:linear-gradient(180deg,#1a1a2e,#3a1c71,#ff758c);
color:white;
overflow:hidden;
}

/* SCREEN */
.screen{
text-align:center;
display:none;
}

.active{
display:block;
}

/* PASSWORD */
input{
padding:12px;
border:none;
border-radius:10px;
outline:none;
font-size:16px;
text-align:center;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff4d88;
color:white;
font-size:16px;
cursor:pointer;
}

/* GAME */
.grid{
display:grid;
grid-template-columns:repeat(4,70px);
gap:12px;
margin-top:15px;
}

.card{
width:70px;
height:70px;
background:#ffffff22;
border-radius:12px;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
cursor:pointer;
transition:.3s;
}

.card.flip{
background:white;
color:#ff4d88;
}

.card.matched{
background:#ff4d88;
color:white;
}

/* WIN */
#win{
margin-top:15px;
font-size:18px;
}
</style>
</head>

<body>

<!-- PASSWORD SCREEN -->
<div id="login" class="screen active">
<h2>Masukkan Tanggal Lahir Kamu</h2>
<h2>(contoh: 01012006)💌</h2>
<input type="password" id="pw" placeholder="Password...">
<br>
<button onclick="checkPw()">Masuk</button>
<p id="error"></p>
</div>

<!-- GAME SCREEN -->
<div id="game" class="screen">
<h2>Memory Game 💖</h2>
<div class="grid" id="grid"></div>
<div id="win"></div>
</div>

<script>
const PASSWORD="22032010"; // GANTI PASSWORD DI SINI

function checkPw(){
let input=document.getElementById("pw").value;

if(input===PASSWORD){
document.getElementById("login").classList.remove("active");
document.getElementById("game").classList.add("active");
}else{
document.getElementById("error").innerText="Password salah 😢";
}
}

/* GAME */
const emojis=["💖","❤️","💕","💘","💝","💗",
"💖","❤️","💕","💘","💝","💗"];

let shuffled=emojis.sort(()=>0.5-Math.random());
const grid=document.getElementById("grid");

let first=null;
let second=null;
let lock=false;
let match=0;

shuffled.forEach(e=>{
const card=document.createElement("div");
card.className="card";
card.dataset.emoji=e;
card.innerHTML="?";

card.onclick=()=>{

if(lock||card.classList.contains("flip"))return;

card.classList.add("flip");
card.innerHTML=e;

if(!first){
first=card;
return;
}

second=card;
lock=true;

if(first.dataset.emoji===second.dataset.emoji){

first.classList.add("matched");
second.classList.add("matched");
match++;
reset();

if(match===6){
document.getElementById("win").innerHTML=
`
❤️ Kamu menang ❤️ <br><br>
<button onclick="nextPage()">Lanjut 💌</button>
`;
}

}else{
setTimeout(()=>{
first.classList.remove("flip");
second.classList.remove("flip");
first.innerHTML="?";
second.innerHTML="?";
reset();
},800);
}
};

grid.appendChild(card);
});

function reset(){
first=null;
second=null;
lock=false;
}
function nextPage(){
window.location.href="buatoca.html";
}
</script>

</body>
</html>
