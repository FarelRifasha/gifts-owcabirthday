<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="icon" href="https://fav.farm/🎂" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Rossa Amelia Iskandar ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg, #1a1a2e, #3a1c71, #ff758c);
            color: white;
            overflow: hidden;
        }

        /* SCREEN SYSTEM */
        .screen {
            text-align: center;
            display: none;
            padding: 20px;
            animation: fadeIn 0.8s ease;
        }

        .active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* TEXT STYLES */
        h2 { margin-bottom: 10px; }
        p { font-size: 14px; opacity: 0.9; line-height: 1.5; }

        /* BUTTONS & INPUT */
        input {
            padding: 12px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
            text-align: center;
            margin-top: 15px;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: #ff4d88;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 77, 136, 0.3);
        }

        button:hover {
            background: #ff2e70;
            transform: scale(1.05);
        }

        /* GAME GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 70px);
            gap: 12px;
            margin-top: 15px;
        }

        .card {
            width: 70px;
            height: 70px;
            background: #ffffff22;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            cursor: pointer;
            transition: .3s;
        }

        .card.flip { background: white; color: #ff4d88; }
        .card.matched { background: #ff4d88; color: white; }
        #win { margin-top: 15px; font-size: 18px; }
    </style>
</head>

<body>

    <div id="welcome" class="screen active">
        <h2>Halo, Rossa Amelia Iskandar ❤️</h2>
        <p>Aku punya sesuatu yang khusus buat kamu hari ini.<br>Siap buat lihat kejutannya?</p>
        <button onclick="start()">Buka Kadonya ✨</button>
    </div>

    <div id="login" class="screen">
        <h2>Verifikasi Dulu Ya.. 💌</h2>
        <p>Masukkan tanggal lahir kamu buat lanjut contoh (12032006).</p>
        <input type="password" id="pw" placeholder="DDMMYYYY...">
        <br>
        <button onclick="checkPw()">Masuk</button>
        <p id="error" style="color: #ffdae0; margin-top: 10px;"></p>
    </div>

    <div id="game" class="screen">
        <h2>Memory Game 💖</h2>
        <p>Cari pasangan yang sama ya!</p>
        <div class="grid" id="grid"></div>
        <div id="win"></div>
    </div>

    <script>
        const PASSWORD = "22032010"; // Password lo tetep sama

        // Fungsi pindah dari Welcome ke Login
        function start() {
            document.getElementById("welcome").classList.remove("active");
            document.getElementById("login").classList.add("active");
        }

        // Fungsi Cek Password
        function checkPw() {
            let input = document.getElementById("pw").value;
            if (input === PASSWORD) {
                document.getElementById("login").classList.remove("active");
                document.getElementById("game").classList.add("active");
            } else {
                document.getElementById("error").innerText = "Ups! Password salah, masa tanggal ultah sendiri ga ingett 😢";
            }
        }

        /* --- LOGIC GAME MEMORY --- */
        const emojis = ["💖", "❤️", "💕", "💘", "💝", "💗", "💖", "❤️", "💕", "💘", "💝", "💗"];
        let shuffled = emojis.sort(() => 0.5 - Math.random());
        const grid = document.getElementById("grid");

        let first = null;
        let second = null;
        let lock = false;
        let match = 0;

        shuffled.forEach(e => {
            const card = document.createElement("div");
            card.className = "card";
            card.dataset.emoji = e;
            card.innerHTML = "?";

            card.onclick = () => {
                if (lock || card.classList.contains("flip")) return;

                card.classList.add("flip");
                card.innerHTML = e;

                if (!first) {
                    first = card;
                    return;
                }

                second = card;
                lock = true;

                if (first.dataset.emoji === second.dataset.emoji) {
                    first.classList.add("matched");
                    second.classList.add("matched");
                    match++;
                    reset();

                    if (match === 6) {
                        document.getElementById("win").innerHTML =
                            `❤️ Kamu menang! ❤️ <br><br>
                            <button onclick="nextPage()">Lanjut 💌</button>`;
                    }
                } else {
                    setTimeout(() => {
                        first.classList.remove("flip");
                        second.classList.remove("flip");
                        first.innerHTML = "?";
                        second.innerHTML = "?";
                        reset();
                    }, 800);
                }
            };
            grid.appendChild(card);
        });

        function reset() {
            first = null;
            second = null;
            lock = false;
        }

        function nextPage() {
            window.location.href = "buatoca.html";
        }
    </script>
</body>
</html>
